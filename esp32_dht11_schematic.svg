<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="60" font-family="monospace" font-size="14" fill="#000000" text-anchor="middle">ESP32 + DHT11 SENSOR INTERFACE</text>

  <!-- ===================== U1: ESP32 ===================== -->
  <rect x="120" y="180" width="160" height="240" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="120" y="170" font-family="monospace" font-size="11" fill="#000000">U1</text>
  <text x="200" y="205" font-family="monospace" font-size="11" fill="#000000" text-anchor="middle">ESP32-WROOM-32</text>

  <!-- U1 pin names (inside, right edge) -->
  <text x="272" y="224" font-family="monospace" font-size="11" fill="#000000" text-anchor="end">3V3</text>
  <text x="272" y="304" font-family="monospace" font-size="11" fill="#000000" text-anchor="end">GPIO4</text>
  <text x="272" y="364" font-family="monospace" font-size="11" fill="#000000" text-anchor="end">GND</text>

  <!-- ===================== U2: DHT11 ===================== -->
  <rect x="560" y="190" width="140" height="200" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="560" y="180" font-family="monospace" font-size="11" fill="#000000">U2</text>
  <text x="630" y="215" font-family="monospace" font-size="11" fill="#000000" text-anchor="middle">DHT11</text>

  <!-- U2 pin names (inside, left edge) -->
  <text x="568" y="224" font-family="monospace" font-size="11" fill="#000000">VCC</text>
  <text x="568" y="304" font-family="monospace" font-size="11" fill="#000000">DATA</text>
  <text x="568" y="364" font-family="monospace" font-size="11" fill="#000000">GND</text>

  <!-- ===================== Wires (right-angle only) ===================== -->
  <!-- 3.3V rail: U1.3V3 -> U2.VCC -->
  <line x1="280" y1="220" x2="560" y2="220" stroke="#000000" stroke-width="1.5"/>
  <!-- DATA: U1.GPIO4 -> U2.DATA -->
  <line x1="280" y1="300" x2="560" y2="300" stroke="#000000" stroke-width="1.5"/>
  <!-- GND: U1.GND -> U2.GND -->
  <line x1="280" y1="360" x2="560" y2="360" stroke="#000000" stroke-width="1.5"/>

  <!-- Net label -->
  <text x="300" y="212" font-family="monospace" font-size="11" fill="#000000">3.3V</text>

  <!-- ===================== R1: 10k pull-up (IEC rectangle) ===================== -->
  <!-- wire: 3.3V rail down to resistor -->
  <line x1="420" y1="220" x2="420" y2="238" stroke="#000000" stroke-width="1.5"/>
  <rect x="412" y="238" width="16" height="46" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <!-- wire: resistor down to DATA line -->
  <line x1="420" y1="284" x2="420" y2="300" stroke="#000000" stroke-width="1.5"/>
  <text x="436" y="256" font-family="monospace" font-size="11" fill="#000000">R1</text>
  <text x="436" y="272" font-family="monospace" font-size="11" fill="#000000">10k&#937;</text>

  <!-- ===================== C1: 100nF decoupling ===================== -->
  <!-- wire: 3.3V rail down to top plate -->
  <line x1="500" y1="220" x2="500" y2="272" stroke="#000000" stroke-width="1.5"/>
  <!-- capacitor plates -->
  <line x1="486" y1="272" x2="514" y2="272" stroke="#000000" stroke-width="2"/>
  <line x1="486" y1="282" x2="514" y2="282" stroke="#000000" stroke-width="2"/>
  <!-- wire: bottom plate down to GND line -->
  <line x1="500" y1="282" x2="500" y2="360" stroke="#000000" stroke-width="1.5"/>
  <text x="520" y="270" font-family="monospace" font-size="11" fill="#000000">C1</text>
  <text x="520" y="286" font-family="monospace" font-size="11" fill="#000000">100nF</text>

  <!-- ===================== Junction dots ===================== -->
  <circle cx="420" cy="220" r="3" fill="#000000"/>
  <circle cx="500" cy="220" r="3" fill="#000000"/>
  <circle cx="420" cy="300" r="3" fill="#000000"/>
  <circle cx="500" cy="360" r="3" fill="#000000"/>

  <!-- ===================== Ground symbol on GND net ===================== -->
  <line x1="340" y1="360" x2="340" y2="392" stroke="#000000" stroke-width="1.5"/>
  <line x1="324" y1="392" x2="356" y2="392" stroke="#000000" stroke-width="2"/>
  <line x1="330" y1="399" x2="350" y2="399" stroke="#000000" stroke-width="2"/>
  <line x1="336" y1="406" x2="344" y2="406" stroke="#000000" stroke-width="2"/>
  <circle cx="340" cy="360" r="3" fill="#000000"/>
  <text x="362" y="404" font-family="monospace" font-size="11" fill="#000000">GND</text>

  <!-- ===================== Notes ===================== -->
  <text x="120" y="480" font-family="monospace" font-size="11" fill="#000000">R1: DATA pull-up to 3.3V (required for DHT11 single-wire bus)</text>
  <text x="120" y="498" font-family="monospace" font-size="11" fill="#000000">C1: supply decoupling, placed close to U2</text>
</svg>
